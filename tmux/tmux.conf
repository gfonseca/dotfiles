# ── General ───────────────────────────────────────────────────────────────────
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g escape-time 10
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g allow-rename on

# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Navigation ────────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Copy mode (vim) ───────────────────────────────────────────────────────────
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Colors / Theme ────────────────────────────────────────────────────────────
set -g window-style 'bg=#2d2d2d,fg=#606060'
set -g window-active-style 'bg=#000000,fg=#ffffff'

set -g status-style 'bg=#6c4fa0,fg=#ffffff'
set -g window-status-current-style 'bg=#9b77cf,fg=#ffffff,bold'

set -g pane-border-lines double
set -g pane-border-style 'fg=#4a4258'
set -g pane-active-border-style 'fg=#9b77cf'

set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#9b77cf bold] ▶ #[fg=#ffffff]#{?#{!=:#{pane_title},},#{pane_title},#{pane_current_command}} ,#[fg=#4a4258] · #{?#{!=:#{pane_title},},#{pane_title},#{pane_current_command}} }"

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status-left-length 30
set -g status-right-length 60
set -g status-left "#[bg=#9b77cf,fg=#ffffff,bold] #S #[default] "
set -g status-right "#[fg=#ffffff] %H:%M  %d %b "
